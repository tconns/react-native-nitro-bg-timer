name: nightly-native-bench

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  android-runtime-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android library smoke
        run: gradle -p android --no-daemon assembleRelease

      - name: Run Android emulator instrumentation smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_4
          script: gradle -p android --no-daemon connectedAndroidTest

  ios-runtime-smoke:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install dependencies
        run: npm ci

      - name: iOS runtime smoke (ObjC++ bridge binary)
        run: bash scripts/ios-runtime-smoke.sh

  stress-soak:
    needs: [android-runtime-emulator, ios-runtime-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Native smoke baseline
        run: NITRO_BG_STRESS_SUMMARY_PATH=stress-smoke-summary.json npm run benchmark:native-smoke

      - name: Soak stress
        run: NITRO_BG_STRESS_SUMMARY_PATH=stress-soak-summary.json npm run stress:soak

      - name: Upload stress summaries
        uses: actions/upload-artifact@v4
        with:
          name: native-stress-summaries
          path: |
            stress-smoke-summary.json
            stress-soak-summary.json
